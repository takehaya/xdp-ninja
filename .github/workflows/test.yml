name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install libpcap-dev
        run: sudo apt-get update -qq && sudo apt-get install -y libpcap-dev

      - name: Build
        run: go build -o xdp-ninja ./cmd/xdp-ninja/

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test ./...

      # Short fuzz gate (30s × 2 targets) to extend the seed corpus
      # past `go test`'s seed-only run. Caches a fail to ./fuzz/ —
      # any reproducer surfaces in the next pre-merge cycle. The
      # cap is per-target so the total CI minute cost stays bounded.
      - name: Fuzz (compile)
        run: go test -run=^$ -fuzz=^FuzzCompile$ -fuzztime=30s ./pkg/kunai/

      - name: Fuzz (lexer)
        run: go test -run=^$ -fuzz=^FuzzLexNext$ -fuzztime=30s ./pkg/kunai/lexer/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpcap-dev libbpf-dev clang tcpdump gcc-multilib
          sudo apt-get install -y linux-tools-$(uname -r) || sudo apt-get install -y linux-tools-generic || true
          # Verify bpftool is available
          which bpftool || (echo "bpftool not found, installing from linux-tools-common" && sudo apt-get install -y linux-tools-common) || true

      - name: Build
        run: go build -o xdp-ninja ./cmd/xdp-ninja/

      - name: Integration Tests
        run: sudo scripts/test/run_tests.sh
