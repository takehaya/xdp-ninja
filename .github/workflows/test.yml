name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install libpcap-dev
        run: sudo apt-get update -qq && sudo apt-get install -y libpcap-dev

      - name: Build
        run: go build -o xdp-ninja ./cmd/xdp-ninja/

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test ./...

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpcap-dev clang tcpdump gcc-multilib linux-tools-common linux-tools-$(uname -r) || true
          # Fallback: install bpftool from linux-tools-generic if kernel-specific package unavailable
          sudo apt-get install -y linux-tools-generic || true

      - name: Build
        run: go build -o xdp-ninja ./cmd/xdp-ninja/

      - name: Integration Tests
        run: sudo test/run_tests.sh
