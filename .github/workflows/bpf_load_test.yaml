---
name: BPF load test

on:
  push:
    branches: [main]
    paths:
      - 'go.*'
      - '**.go'
      - '**.p4'
      - '.github/workflows/bpf_load_test.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'go.*'
      - '**.go'
      - '**.p4'
      - '.github/workflows/bpf_load_test.yaml'

jobs:
  bpf-load-test:
    name: BPF load test (kernel ${{ matrix.kernel }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        kernel:
          - "6.1"
          - "6.6"
          - "6.12"
          - "6.18"
          - "7.0"
    permissions:
      contents: read
      packages: read
    env:
      VIMTO_VERSION: v0.4.0
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Install libpcap-dev
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libpcap-dev gcc-multilib

      - name: Cache vimto binary
        uses: actions/cache@v4
        id: vimto-cache
        with:
          path: ~/go/bin/vimto
          key: vimto-bin-${{ runner.os }}-${{ env.VIMTO_VERSION }}

      - name: Install vimto
        if: steps.vimto-cache.outputs.cache-hit != 'true'
        run: CGO_ENABLED=0 go install lmb.io/vimto@${{ env.VIMTO_VERSION }}

      - name: Install crane
        run: CGO_ENABLED=0 go install github.com/google/go-containerregistry/cmd/crane@v0.20.7

      - name: Cache QEMU packages
        uses: actions/cache@v4
        id: qemu-cache
        with:
          path: ~/.cache/qemu-debs
          key: qemu-debs-${{ runner.os }}-${{ runner.arch }}

      - name: Install QEMU
        run: |
          if [ -d ~/.cache/qemu-debs ]; then
            sudo cp ~/.cache/qemu-debs/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-system-x86
          mkdir -p ~/.cache/qemu-debs
          cp /var/cache/apt/archives/qemu*.deb ~/.cache/qemu-debs/ 2>/dev/null || true

      - name: Enable KVM
        run: sudo chmod 0666 /dev/kvm

      - name: Cache kernel images
        uses: actions/cache@v4
        with:
          path: ~/.cache/vimto
          key: vimto-kernel-${{ matrix.kernel }}

      - name: Pre-fetch kernel image
        run: |
          REF="ghcr.io/cilium/ci-kernels:${{ matrix.kernel }}"
          HASH=$(echo -n "$REF" | sha256sum | cut -d' ' -f1)
          DIR="$HOME/.cache/vimto/${HASH}/contents"
          if [ ! -d "$DIR" ]; then
            echo "Fetching $REF (authenticated)..."
            crane auth login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"
            mkdir -p "$DIR"
            crane export "$REF" - | tar -xf - -C "$DIR"
          else
            echo "Cache hit: $DIR"
          fi

      - name: Run BPF load test
        run: |
          set -o pipefail
          vimto -sudo -kernel :${{ matrix.kernel }} -- \
            go test -v -count 1 -timeout 5m ./internal/program/ -run TestBpf \
            2>&1 | tee bpf_load_kernel_${{ matrix.kernel }}.log

      # E4 verifier matrix: extract the per-(filter, host) verdict from
      # TestBpfFilterSet{XDP,TC}/Fn subtests so the paper's Table 2 has
      # a per-cell artifact rather than reading the full test log.
      # Header + 20 rows per kernel; aggregating the four kernel CSVs
      # gives the 80-cell matrix.
      - name: Extract verifier matrix CSV
        if: always()
        run: |
          {
            echo "filter,host,verdict,kernel"
            awk -v k="${{ matrix.kernel }}" '
              /^    --- (PASS|FAIL): TestBpfFilterSet(XDP|TC)\// {
                verdict = tolower($2); sub(/:$/, "", verdict)
                n = split($3, parts, "/")
                if (n >= 2) {
                  host = parts[1]
                  sub(/^TestBpfFilterSet/, "", host)
                  print parts[2] "," host "," verdict "," k
                }
              }
            ' bpf_load_kernel_${{ matrix.kernel }}.log
          } > verifier_matrix_kernel_${{ matrix.kernel }}.csv
          cat verifier_matrix_kernel_${{ matrix.kernel }}.csv

      - name: Upload verifier matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verifier-matrix-kernel-${{ matrix.kernel }}
          path: |
            verifier_matrix_kernel_${{ matrix.kernel }}.csv
            bpf_load_kernel_${{ matrix.kernel }}.log
          retention-days: 30

      # dsltest exercises the full DSL → eBPF pipeline end-to-end via
      # BPF_PROG_TEST_RUN against gopacket-built frames. Adding it here
      # gives ParserCounter (and any future codegen shape introduced
      # via synthetic vocabs in dsltest) the same 4-kernel verifier
      # coverage as the bundled-vocab paths above.
      - name: Run DSL E2E test
        run: vimto -sudo -kernel :${{ matrix.kernel }} -- go test -v -count 1 -timeout 5m ./pkg/kunai/dsltest/
